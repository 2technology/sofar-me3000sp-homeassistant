# =============================================================================
# SOFAR ME3000SP Home Assistant Package
#
# Doel:
#   - Externe-bron-sturing op basis van slimme meter + SMA PV
#   - Geen automation op interne Sofar CT/PV/load-metingen
#   - Volledig pakket: template sensors, helpers en automations
# =============================================================================

# -----------------------------------------------------------------------------
# TEMPLATE SENSORS — waarheid omzetten naar nette W-waardes
# -----------------------------------------------------------------------------
template:
  - sensor:
      - name: "SOFAR Grid Export Power"
        unique_id: sofar_grid_export_power_w
        icon: mdi:transmission-tower-export
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.electricity_meter_energieproductie') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ (states('sensor.electricity_meter_energieproductie') | float(0) * 1000) | round(0) }}

      - name: "SOFAR Grid Import Power"
        unique_id: sofar_grid_import_power_w
        icon: mdi:transmission-tower-import
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.electricity_meter_energieverbruik') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ (states('sensor.electricity_meter_energieverbruik') | float(0) * 1000) | round(0) }}

      - name: "SOFAR Net Grid Power"
        unique_id: sofar_net_grid_power_w
        icon: mdi:home-lightning-bolt
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.electricity_meter_energieproductie') not in ['unknown', 'unavailable', 'none']
             and states('sensor.electricity_meter_energieverbruik') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {{ (export_w - import_w) | round(0) }}

      - name: "SOFAR Grid Surplus Power"
        unique_id: sofar_grid_surplus_power_w
        icon: mdi:weather-sunny-arrow-right
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.electricity_meter_energieproductie') not in ['unknown', 'unavailable', 'none']
             and states('sensor.electricity_meter_energieverbruik') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {% set net_w = export_w - import_w %}
          {{ [net_w, 0] | max | round(0) }}

      - name: "SOFAR Grid Deficit Power"
        unique_id: sofar_grid_deficit_power_w
        icon: mdi:weather-sunny-clock
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.electricity_meter_energieproductie') not in ['unknown', 'unavailable', 'none']
             and states('sensor.electricity_meter_energieverbruik') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {% set net_w = export_w - import_w %}
          {{ [0 - net_w, 0] | max | round(0) }}

      - name: "SOFAR House Load Power"
        unique_id: sofar_house_load_power_w
        icon: mdi:home-lightning-bolt-outline
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.electricity_meter_energieproductie') not in ['unknown', 'unavailable', 'none']
             and states('sensor.electricity_meter_energieverbruik') not in ['unknown', 'unavailable', 'none']
             and states('sensor.sunny_pv_power') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {% set pv_w = states('sensor.sunny_pv_power') | float(0) %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {{ (pv_w + import_w - export_w) | round(0) }}

      - name: "SOFAR SMA PV Power"
        unique_id: sofar_sma_pv_power_w
        icon: mdi:solar-power
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >-
          {{ states('sensor.sunny_pv_power') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('sensor.sunny_pv_power') | float(0) | round(0) }}

      - name: "SOFAR Flow Direction"
        unique_id: sofar_flow_direction
        icon: mdi:state-machine
        availability: >-
          {{ states('sensor.electricity_meter_energieproductie') not in ['unknown', 'unavailable', 'none']
             and states('sensor.electricity_meter_energieverbruik') not in ['unknown', 'unavailable', 'none']
             and states('sensor.sofar_me3000sp_sofar_me3000sp_fault_messages') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {% set fault = states('sensor.sofar_me3000sp_sofar_me3000sp_fault_messages') %}
          {% set mode = states('select.sofar_me3000sp_sofar_me3000sp_mode') %}
          {% set export_w = states('sensor.sofar_grid_export_power') | float(0) %}
          {% set import_w = states('sensor.sofar_grid_import_power') | float(0) %}
          {% set balance_w = states('input_number.sofar_balance_w') | float(150) %}
          {% if fault not in ['OK', 'unknown', 'unavailable'] %}
            alarm
          {% elif mode == 'standby' %}
            standby
          {% elif mode == 'charge' %}
            charging
          {% elif mode == 'discharge' %}
            discharging
          {% elif (export_w - import_w) | abs < balance_w %}
            balanced
          {% elif export_w > import_w %}
            exporting
          {% else %}
            importing
          {% endif %}

      - name: "SOFAR Visual Summary"
        unique_id: sofar_visual_summary
        icon: mdi:chart-box-outline
        availability: >-
          {{ states('sensor.sofar_grid_export_power') not in ['unknown', 'unavailable', 'none']
             and states('sensor.sofar_grid_import_power') not in ['unknown', 'unavailable', 'none']
             and states('sensor.sofar_sma_pv_power') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          PV {{ states('sensor.sofar_sma_pv_power') }} W ·
          Export {{ states('sensor.sofar_grid_export_power') }} W ·
          Import {{ states('sensor.sofar_grid_import_power') }} W ·
          Netto {{ states('sensor.sofar_net_grid_power') }} W ·
          Mode {{ states('select.sofar_me3000sp_sofar_me3000sp_mode') }}


  - binary_sensor:
      - name: "SOFAR Charging Active"
        unique_id: sofar_charging_active
        icon: mdi:battery-arrow-up
        availability: >-
          {{ states('select.sofar_me3000sp_sofar_me3000sp_mode') not in ['unknown', 'unavailable', 'none']
             and states('number.sofar_me3000sp_sofar_me3000sp_charge_rate') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('select.sofar_me3000sp_sofar_me3000sp_mode') == 'charge'
             and states('number.sofar_me3000sp_sofar_me3000sp_charge_rate') | float(0) > 0 }}

      - name: "SOFAR Discharging Active"
        unique_id: sofar_discharging_active
        icon: mdi:battery-arrow-down
        availability: >-
          {{ states('select.sofar_me3000sp_sofar_me3000sp_mode') not in ['unknown', 'unavailable', 'none']
             and states('number.sofar_me3000sp_sofar_me3000sp_discharge_rate') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('select.sofar_me3000sp_sofar_me3000sp_mode') == 'discharge'
             and states('number.sofar_me3000sp_sofar_me3000sp_discharge_rate') | float(0) > 0 }}

      - name: "SOFAR Exporting"
        unique_id: sofar_exporting
        icon: mdi:transmission-tower-export
        availability: >-
          {{ states('sensor.sofar_grid_surplus_power') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('sensor.sofar_grid_surplus_power') | float(0) > 0 }}

      - name: "SOFAR Importing"
        unique_id: sofar_importing
        icon: mdi:transmission-tower-import
        availability: >-
          {{ states('sensor.sofar_grid_deficit_power') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('sensor.sofar_grid_deficit_power') | float(0) > 0 }}

      - name: "SOFAR Balanced Grid"
        unique_id: sofar_balanced_grid
        icon: mdi:scale-balance
        availability: >-
          {{ states('sensor.sofar_net_grid_power') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('sensor.sofar_net_grid_power') | float(0) | abs <= states('input_number.sofar_balance_w') | float(150) }}

      - name: "SOFAR Alarm Active"
        unique_id: sofar_alarm_active
        icon: mdi:alert-circle
        availability: >-
          {{ states('sensor.sofar_me3000sp_sofar_me3000sp_fault_messages') not in ['unknown', 'unavailable', 'none'] }}
        state: >-
          {{ states('sensor.sofar_me3000sp_sofar_me3000sp_fault_messages') not in ['OK', 'unknown', 'unavailable'] }}

# -----------------------------------------------------------------------------
# HELPER INSTELLINGEN — drempels die je via de UI kunt tunen
# -----------------------------------------------------------------------------
input_number:
  sofar_export_start_w:
    name: SOFAR Export Start W
    min: 0
    max: 2000
    step: 50
    mode: box
    icon: mdi:transmission-tower-export
    initial: 400

  sofar_import_start_w:
    name: SOFAR Import Start W
    min: 0
    max: 2000
    step: 50
    mode: box
    icon: mdi:transmission-tower-import
    initial: 300

  sofar_pv_min_w:
    name: SOFAR PV Min W
    min: 0
    max: 5000
    step: 50
    mode: box
    icon: mdi:solar-power
    initial: 700

  sofar_balance_w:
    name: SOFAR Balance W
    min: 0
    max: 1000
    step: 25
    mode: box
    icon: mdi:scale-balance
    initial: 150

  sofar_charge_margin_w:
    name: SOFAR Charge Margin W
    min: 0
    max: 1000
    step: 25
    mode: box
    icon: mdi:battery-plus
    initial: 150

  sofar_discharge_margin_w:
    name: SOFAR Discharge Margin W
    min: 0
    max: 1000
    step: 25
    mode: box
    icon: mdi:battery-minus
    initial: 250

  sofar_soc_max_charge:
    name: SOFAR SOC Max Charge %
    min: 0
    max: 100
    step: 1
    mode: box
    icon: mdi:battery-high
    initial: 95

  sofar_soc_min_discharge:
    name: SOFAR SOC Min Discharge %
    min: 0
    max: 100
    step: 1
    mode: box
    icon: mdi:battery-alert
    initial: 35

# -----------------------------------------------------------------------------
# AUTOMATIONS — de echte regels
# -----------------------------------------------------------------------------
automation:
  - id: sofar_set_auto_day
    alias: "☀️ SOFAR: Baseline auto overdag"
    description: "Zet inverter naar auto als neutrale uitgangspositie"
    mode: single
    trigger:
      - platform: sun
        event: sunrise
        offset: "00:20:00"
    action:
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "auto"

  - id: sofar_charge_on_export
    alias: "⚡ SOFAR: Charge bij echte export"
    description: "Laad batterij bij netto export / PV-overschot"
    mode: restart
    trigger:
      - platform: template
        value_template: >-
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {% set surplus_w = [export_w - import_w, 0] | max %}
          {% set export_start = states('input_number.sofar_export_start_w') | float(400) %}
          {% set pv_min = states('input_number.sofar_pv_min_w') | float(700) %}
          {% set soc_max = states('input_number.sofar_soc_max_charge') | float(95) %}
          {{ surplus_w > export_start
             and states('sensor.sunny_pv_power') | float(0) > pv_min
             and states('sensor.sofar_me3000sp_sofar_me3000sp_battery_soc') | float(0) < soc_max }}
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_fault_messages
        state: "OK"
    action:
      - variables:
          export_w: "{{ states('sensor.electricity_meter_energieproductie') | float(0) * 1000 }}"
          import_w: "{{ states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 }}"
          net_w: "{{ export_w - import_w }}"
          margin_w: "{{ states('input_number.sofar_charge_margin_w') | float(150) }}"
          charge_w: "{{ [net_w - margin_w, 0] | max | round(0) }}"
      - condition: template
        value_template: "{{ charge_w > 0 }}"
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "charge"
      - service: number.set_value
        target:
          entity_id: number.sofar_me3000sp_sofar_me3000sp_charge_rate
        data:
          value: "{{ [charge_w, 3000] | min }}"

  - id: sofar_discharge_on_import
    alias: "💸 SOFAR: Discharge bij import"
    description: "Ontlaad batterij bij netto import als buffer"
    mode: restart
    trigger:
      - platform: template
        value_template: >-
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {% set import_start = states('input_number.sofar_import_start_w') | float(300) %}
          {% set soc_min = states('input_number.sofar_soc_min_discharge') | float(35) %}
          {{ import_w > import_start
             and (import_w - export_w) > 0
             and states('sensor.sofar_me3000sp_sofar_me3000sp_battery_soc') | float(0) > soc_min }}
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_fault_messages
        state: "OK"
    action:
      - variables:
          export_w: "{{ states('sensor.electricity_meter_energieproductie') | float(0) * 1000 }}"
          import_w: "{{ states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 }}"
          deficit_w: "{{ [import_w - export_w, 0] | max | round(0) }}"
          margin_w: "{{ states('input_number.sofar_discharge_margin_w') | float(250) }}"
          discharge_w: "{{ [deficit_w + margin_w, 0] | max | round(0) }}"
      - condition: template
        value_template: "{{ discharge_w > 0 }}"
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "discharge"
      - service: number.set_value
        target:
          entity_id: number.sofar_me3000sp_sofar_me3000sp_discharge_rate
        data:
          value: "{{ [discharge_w, 3000] | min }}"

  - id: sofar_return_auto_when_balanced
    alias: "🧊 SOFAR: Terug naar auto bij balans"
    description: "Zet inverter terug naar auto als netflow quasi nul is"
    mode: restart
    trigger:
      - platform: template
        value_template: >-
          {% set export_w = states('sensor.electricity_meter_energieproductie') | float(0) * 1000 %}
          {% set import_w = states('sensor.electricity_meter_energieverbruik') | float(0) * 1000 %}
          {% set balance_w = states('input_number.sofar_balance_w') | float(150) %}
          {{ (export_w - import_w) | abs < balance_w }}
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_fault_messages
        state: "OK"
    action:
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "auto"

  - id: sofar_alarm_standby
    alias: "🚨 SOFAR: Nood-stop bij alarm"
    description: "Zet inverter in standby bij actief alarm"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_fault_messages
        not_to:
          - "OK"
          - "unavailable"
          - "unknown"
    action:
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "standby"
      - service: notify.persistent_notification
        data:
          title: "🚨 SOFAR ME3000SP ALARM"
          message: >-
            Inverter in STANDBY gezet wegens alarm:
            {{ states('sensor.sofar_me3000sp_sofar_me3000sp_fault_messages') }}

  - id: sofar_force_charge_low_soc
    alias: "🪫 SOFAR: Force Charge bij kritisch lage SOC"
    description: "Laad batterij ongeacht PV/export als SOC onder 20% zakt"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_battery_soc
        below: 20
    condition:
      - condition: state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_fault_messages
        state: "OK"
    action:
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "charge"
      - service: number.set_value
        target:
          entity_id: number.sofar_me3000sp_sofar_me3000sp_charge_rate
        data:
          value: 1500
      - wait_for_trigger:
          - platform: numeric_state
            entity_id: sensor.sofar_me3000sp_sofar_me3000sp_battery_soc
            above: 50
        timeout: "04:00:00"
      - service: select.select_option
        target:
          entity_id: select.sofar_me3000sp_sofar_me3000sp_mode
        data:
          option: "auto"

  - id: sofar_battery_full_notify
    alias: "🔋 SOFAR: Batterij vol notificatie"
    description: "Stuur notificatie als batterij 100% bereikt"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.sofar_me3000sp_sofar_me3000sp_battery_soc
        above: 99
    action:
      - service: notify.persistent_notification
        data:
          title: "🔋 Batterij vol"
          message: >-
            SOFAR ME3000SP batterij is 100% —
            {{ states('sensor.sofar_me3000sp_sofar_me3000sp_battery_charge_today') }} Wh geladen vandaag
