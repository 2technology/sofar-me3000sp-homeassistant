name: Bug report
description: Report a problem with the SOFAR ME3000SP Controller integration
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Please fill in the fields below so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: Integration version
      description: Which version of the integration are you running?
      placeholder: e.g. v2.5.7
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Which Home Assistant version are you running?
      placeholder: e.g. 2024.7.1
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Describe your hardware setup (SOFAR model, ESP32/MAX3485, smart meter, PV inverter)
      placeholder: |
        - SOFAR ME3000SP Passive Mode
        - ESP32 + MAX3485
        - Smart meter via P1
        - SMA PV inverter
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug. Include strategy, SOC, and what the decision reason sensor reported.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Home Assistant logs (Settings → System → Logs). Redact sensitive info.
      render: text
