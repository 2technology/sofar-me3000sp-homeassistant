blueprint:
  name: "SOFAR ME3000SP: Return to Auto on Grid Balance"
  description: >
    Return the inverter to auto mode when the grid flow is nearly zero (balanced).

    Part of the SOFAR ME3000SP Controller blueprints.
  domain: automation
  source_url: http://192.168.1.80:3000/Mad_Science_Lab/sofar-me3000sp-homeassistant/src/branch/master/blueprints/automation/sofar_return_auto_balanced.yaml
  input:
    export_entity:
      name: "Smart Meter Export (kW)"
      selector:
        entity:
          domain: sensor
    import_entity:
      name: "Smart Meter Import (kW)"
      selector:
        entity:
          domain: sensor
    fault_entity:
      name: "Fault Messages"
      selector:
        entity:
          domain: sensor
    mode_entity:
      name: "SOFAR Mode Select"
      selector:
        entity:
          domain: select
    balance_w:
      name: "Balance Threshold (W)"
      default: 150
      selector:
        number:
          min: 0
          max: 1000
          step: 25
          unit_of_measurement: W
    hold_time:
      name: "Hold Time (seconds)"
      default: 600
      selector:
        number:
          min: 0
          max: 3600
          step: 30
          unit_of_measurement: s

mode: restart
trigger:
  - platform: template
    value_template: >-
      {% set export_w = states('!input export_entity') | float(0) * 1000 %}
      {% set import_w = states('!input import_entity') | float(0) * 1000 %}
      {% set balance_w = !input balance_w %}
      {{ (export_w - import_w) | abs < balance_w }}
    for:
      seconds: !input hold_time
condition:
  - condition: state
    entity_id: !input fault_entity
    state: "OK"
action:
  - service: select.select_option
    target:
      entity_id: !input mode_entity
    data:
      option: "auto"
