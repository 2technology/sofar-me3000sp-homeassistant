set_mode:
  name: Set inverter mode
  description: Manually set the SOFAR ME3000SP inverter mode.
  fields:
    config_entry_id:
      name: Config entry
      description: Which SOFAR entry to control. Only needed with multiple entries.
      required: false
      selector:
        config_entry:
          integration: sofar_me3000sp
    mode:
      name: Mode
      description: "Desired mode: auto, charge, discharge or standby."
      required: true
      example: "auto"
      selector:
        select:
          options:
            - "auto"
            - "charge"
            - "discharge"
            - "standby"

set_charge_rate:
  name: Set charge rate
  description: Set the charge power (0-3000 W).
  fields:
    config_entry_id:
      name: Config entry
      description: Which SOFAR entry to control. Only needed with multiple entries.
      required: false
      selector:
        config_entry:
          integration: sofar_me3000sp
    rate:
      name: Charge rate
      description: Charge power in watts.
      required: true
      example: 1500
      selector:
        number:
          min: 0
          max: 3000
          step: 50
          unit_of_measurement: "W"
          mode: slider

set_discharge_rate:
  name: Set discharge rate
  description: Set the discharge power (0-3000 W).
  fields:
    config_entry_id:
      name: Config entry
      description: Which SOFAR entry to control. Only needed with multiple entries.
      required: false
      selector:
        config_entry:
          integration: sofar_me3000sp
    rate:
      name: Discharge rate
      description: Discharge power in watts.
      required: true
      example: 1500
      selector:
        number:
          min: 0
          max: 3000
          step: 50
          unit_of_measurement: "W"
          mode: slider
