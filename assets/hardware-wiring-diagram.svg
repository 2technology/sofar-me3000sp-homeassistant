<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" style="background:#0B1421;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;">
  <defs>
    <style>
      .box { stroke-width:2.5; rx:10; }
      .esp { fill:url(#espGrad); stroke:#39FF8A; }
      .max { fill:url(#maxGrad); stroke:#FF5C8A; }
      .sofar { fill:url(#sofarGrad); stroke:#00D4FF; }
      .text { fill:#E0E0E0; font-size:15px; }
      .title { font-size:20px; font-weight:bold; }
      .esp-title { fill:#39FF8A; }
      .max-title { fill:#FF5C8A; }
      .sofar-title { fill:#00D4FF; }
      .pin { font-size:13px; }
      .wire { stroke-width:3; fill:none; stroke-linecap:round; }
      .tx { stroke:#39FF8A; }
      .rx { stroke:#00D4FF; }
      .ctrl { stroke:#FF5C8A; }
      .pwr { stroke:#FFD700; }
      .gnd { stroke:#888; }
      .bus { stroke:#FF5C8A; }
      .wire-label { font-size:12px; font-weight:bold; }
      .tx-label { fill:#39FF8A; }
      .rx-label { fill:#00D4FF; }
      .ctrl-label { fill:#FF5C8A; }
      .pwr-label { fill:#FFD700; }
      .gnd-label { fill:#888; }
      .bus-label { fill:#FF5C8A; }
      .note { fill:#A0B4C8; font-size:13px; }
      .glow { filter:url(#glow); }
    </style>
    <linearGradient id="espGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#132238;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1929;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="maxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1028;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12081C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sofarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2530;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051520;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowTx" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#39FF8A" />
    </marker>
    <marker id="arrowRx" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00D4FF" />
    </marker>
    <marker id="arrowCtrl" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF5C8A" />
    </marker>
    <marker id="arrowPwr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFD700" />
    </marker>
    <marker id="arrowGnd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888" />
    </marker>
    <marker id="arrowBus" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF5C8A" />
    </marker>
  </defs>

  <!-- Background grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2A40" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="580" fill="url(#grid)" />

  <!-- ESP32 -->
  <rect x="50" y="60" width="240" height="460" class="box esp glow" />
  <text x="170" y="95" text-anchor="middle" class="title esp-title">ESP32</text>
  <text x="170" y="118" text-anchor="middle" class="text">ESP32 dev board</text>
  <text x="170" y="140" text-anchor="middle" class="text" style="font-size:12px;fill:#39FF8A;opacity:0.8">UART2 → RS485</text>

  <text x="70" y="185" class="pin esp-title">GPIO17 (TX)</text>
  <text x="70" y="230" class="pin rx-label">GPIO16 (RX)</text>
  <text x="70" y="275" class="pin ctrl-label">GPIO5</text>
  <text x="70" y="360" class="pin pwr-label">3.3V</text>
  <text x="70" y="465" class="pin gnd-label">GND</text>

  <!-- MAX3485 -->
  <rect x="380" y="110" width="260" height="360" class="box max glow" />
  <text x="510" y="145" text-anchor="middle" class="title max-title">MAX3485</text>
  <text x="510" y="168" text-anchor="middle" class="text">3.3V RS485 transceiver</text>
  <text x="510" y="190" text-anchor="middle" class="text" style="font-size:12px;fill:#FF5C8A;opacity:0.8">DE + RE tied together</text>

  <text x="400" y="220" class="pin max-title">DI</text>
  <text x="400" y="265" class="pin rx-label">RO</text>
  <text x="400" y="310" class="pin ctrl-label">DE</text>
  <text x="400" y="332" class="pin ctrl-label">RE</text>
  <text x="400" y="380" class="pin pwr-label">VCC</text>
  <text x="400" y="435" class="pin gnd-label">GND</text>
  <text x="400" y="475" class="pin bus-label">A</text>
  <text x="400" y="497" class="pin bus-label">B</text>

  <!-- SOFAR -->
  <rect x="720" y="150" width="150" height="280" class="box sofar glow" />
  <text x="795" y="185" text-anchor="middle" class="title sofar-title">SOFAR</text>
  <text x="795" y="208" text-anchor="middle" class="text">ME3000SP</text>
  <text x="795" y="240" text-anchor="middle" class="text" style="font-size:13px">485s poort</text>
  <text x="795" y="265" text-anchor="middle" class="text" style="font-size:12px;fill:#00D4FF;opacity:0.8">Modbus 0x42</text>

  <text x="740" y="340" class="pin bus-label">A</text>
  <text x="740" y="385" class="pin bus-label">B</text>

  <!-- Connection dots -->
  <circle cx="290" cy="190" r="5" fill="#39FF8A" />
  <circle cx="290" cy="235" r="5" fill="#00D4FF" />
  <circle cx="290" cy="280" r="5" fill="#FF5C8A" />
  <circle cx="290" cy="365" r="5" fill="#FFD700" />
  <circle cx="290" cy="470" r="5" fill="#888" />
  <circle cx="640" cy="486" r="5" fill="#FF5C8A" />
  <circle cx="640" cy="508" r="5" fill="#FF5C8A" />

  <!-- Wires -->
  <!-- TX → DI -->
  <path d="M 290 190 L 380 220" class="wire tx" marker-end="url(#arrowTx)" />
  <!-- RX → RO -->
  <path d="M 290 235 L 380 265" class="wire rx" marker-end="url(#arrowRx)" />
  <!-- GPIO5 → DE+RE -->
  <path d="M 290 280 L 335 280 L 335 321 L 380 321" class="wire ctrl" marker-end="url(#arrowCtrl)" />
  <!-- 3.3V → VCC -->
  <path d="M 290 365 L 380 380" class="wire pwr" marker-end="url(#arrowPwr)" />
  <!-- GND → GND -->
  <path d="M 290 470 L 380 435" class="wire gnd" marker-end="url(#arrowGnd)" />
  <!-- A → A -->
  <path d="M 640 486 L 720 340" class="wire bus" marker-end="url(#arrowBus)" />
  <!-- B → B -->
  <path d="M 640 508 L 720 385" class="wire bus" marker-end="url(#arrowBus)" />

  <!-- Wire labels -->
  <text x="330" y="180" text-anchor="middle" class="wire-label tx-label">TX</text>
  <text x="330" y="230" text-anchor="middle" class="wire-label rx-label">RX</text>
  <text x="360" y="300" text-anchor="middle" class="wire-label ctrl-label">GPIO5</text>
  <text x="330" y="355" text-anchor="middle" class="wire-label pwr-label">3.3V</text>
  <text x="330" y="450" text-anchor="middle" class="wire-label gnd-label">GND</text>
  <text x="680" y="420" text-anchor="middle" class="wire-label bus-label">A</text>
  <text x="680" y="455" text-anchor="middle" class="wire-label bus-label">B</text>

  <!-- Notes -->
  <text x="50" y="545" class="note">⚡ GPIO5 drives both DE and RE — the MAX3485 auto-switches between TX and RX.</text>
  <text x="50" y="565" class="note">🔋 Use a 3.3V MAX3485 module. 5V modules can damage the ESP32.</text>
  <text x="50" y="585" class="note">🛠️ Keep A/B polarity correct. Most wiring issues are reversed A/B or SOFAR not in Passive Mode.</text>
</svg>