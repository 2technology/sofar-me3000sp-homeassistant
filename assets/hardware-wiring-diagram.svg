<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <filter id="glowG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF5C8A"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#39FF8A"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FFC145"/>
    </marker>
    <marker id="arrW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E0E0E0"/>
    </marker>
  </defs>

  <!-- ======== achtergrond ======== -->
  <rect width="1200" height="700" fill="#0E1A2B"/>

  <!-- ======== header ======== -->
  <text x="60" y="52" fill="#39FF8A" font-size="22" font-weight="bold" filter="url(#glowG)">ESP32 ⇄ MAX3485 ⇄ SOFAR ME3000SP</text>
  <text x="60" y="76" fill="#7E93AC" font-size="12" letter-spacing="3">HARDWARE WIRING · RS485 HALF-DUPLEX</text>
  <rect x="905" y="34" width="235" height="26" rx="13" fill="none" stroke="#1E3350"/>
  <text x="1022" y="51" fill="#FF5C8A" font-size="12" text-anchor="middle">Modbus FC 0x42 · Passive Mode</text>

  <!-- ======== ESP32 board ======== -->
  <rect x="60" y="130" width="260" height="340" rx="10" fill="#12233A" stroke="#1E3350" stroke-width="1.5"/>
  <text x="190" y="158" fill="#E0E0E0" font-size="15" font-weight="bold" text-anchor="middle">ESP32 DEVKIT</text>
  <!-- chip + usb detail -->
  <rect x="120" y="255" width="110" height="80" rx="4" fill="#0F1E33" stroke="#1E3350"/>
  <text x="175" y="290" fill="#4A5F7A" font-size="10" text-anchor="middle">ESP32-</text>
  <text x="175" y="304" fill="#4A5F7A" font-size="10" text-anchor="middle">WROOM-32</text>
  <rect x="150" y="455" width="60" height="15" rx="3" fill="#0F1E33" stroke="#1E3350"/>
  <text x="180" y="484" fill="#4A5F7A" font-size="9" text-anchor="middle">USB</text>
  <!-- pins rechts -->
  <g font-size="13">
    <rect x="312" y="182" width="16" height="16" fill="#0F1E33" stroke="#FF5C8A"/>
    <text x="300" y="195" fill="#FF5C8A" text-anchor="end" font-weight="bold">GPIO17 · TX</text>
    <rect x="312" y="242" width="16" height="16" fill="#0F1E33" stroke="#39FF8A"/>
    <text x="300" y="255" fill="#39FF8A" text-anchor="end" font-weight="bold">GPIO16 · RX</text>
    <rect x="312" y="302" width="16" height="16" fill="#0F1E33" stroke="#FFC145"/>
    <text x="300" y="315" fill="#FFC145" text-anchor="end" font-weight="bold">GPIO4</text>
    <rect x="312" y="362" width="16" height="16" fill="#0F1E33" stroke="#E0E0E0"/>
    <text x="300" y="375" fill="#E0E0E0" text-anchor="end" font-weight="bold">3V3</text>
    <rect x="312" y="422" width="16" height="16" fill="#0F1E33" stroke="#4A5F7A"/>
    <text x="300" y="435" fill="#7E93AC" text-anchor="end" font-weight="bold">GND</text>
  </g>

  <!-- ======== MAX3485 module ======== -->
  <rect x="520" y="150" width="220" height="320" rx="10" fill="#12233A" stroke="#1E3350" stroke-width="1.5"/>
  <text x="630" y="178" fill="#E0E0E0" font-size="15" font-weight="bold" text-anchor="middle">MAX3485</text>
  <text x="630" y="196" fill="#FFC145" font-size="11" text-anchor="middle">3.3 V variant — required</text>
  <rect x="585" y="270" width="90" height="46" rx="4" fill="#0F1E33" stroke="#1E3350"/>
  <text x="630" y="297" fill="#4A5F7A" font-size="10" text-anchor="middle">MAX3485 IC</text>
  <!-- pins links -->
  <g font-size="13" font-weight="bold">
    <rect x="512" y="182" width="16" height="16" fill="#0F1E33" stroke="#FF5C8A"/>
    <text x="540" y="195" fill="#FF5C8A">DI</text>
    <rect x="512" y="242" width="16" height="16" fill="#0F1E33" stroke="#39FF8A"/>
    <text x="540" y="255" fill="#39FF8A">RO</text>
    <rect x="512" y="292" width="16" height="16" fill="#0F1E33" stroke="#FFC145"/>
    <text x="540" y="305" fill="#FFC145">DE</text>
    <rect x="512" y="322" width="16" height="16" fill="#0F1E33" stroke="#FFC145"/>
    <text x="540" y="335" fill="#FFC145">RE</text>
    <rect x="512" y="362" width="16" height="16" fill="#0F1E33" stroke="#E0E0E0"/>
    <text x="540" y="375" fill="#E0E0E0">VCC</text>
    <rect x="512" y="422" width="16" height="16" fill="#0F1E33" stroke="#4A5F7A"/>
    <text x="540" y="435" fill="#7E93AC">GND</text>
  </g>
  <!-- pins rechts -->
  <g font-size="13" font-weight="bold">
    <rect x="732" y="242" width="16" height="16" fill="#0F1E33" stroke="#39FF8A"/>
    <text x="720" y="255" fill="#39FF8A" text-anchor="end">A</text>
    <rect x="732" y="302" width="16" height="16" fill="#0F1E33" stroke="#39FF8A"/>
    <text x="720" y="315" fill="#39FF8A" text-anchor="end">B</text>
  </g>

  <!-- ======== SOFAR ======== -->
  <rect x="920" y="170" width="220" height="280" rx="10" fill="#12233A" stroke="#1E3350" stroke-width="1.5"/>
  <text x="1030" y="200" fill="#E0E0E0" font-size="15" font-weight="bold" text-anchor="middle">SOFAR ME3000SP</text>
  <text x="1030" y="218" fill="#7E93AC" font-size="11" text-anchor="middle">485s port</text>
  <!-- schroefterminals -->
  <g font-size="13" font-weight="bold">
    <circle cx="936" cy="250" r="9" fill="#0F1E33" stroke="#39FF8A"/>
    <line x1="931" y1="245" x2="941" y2="255" stroke="#39FF8A" stroke-width="1.5"/>
    <text x="958" y="255" fill="#39FF8A">485s-A</text>
    <circle cx="936" cy="310" r="9" fill="#0F1E33" stroke="#39FF8A"/>
    <line x1="931" y1="305" x2="941" y2="315" stroke="#39FF8A" stroke-width="1.5"/>
    <text x="958" y="315" fill="#39FF8A">485s-B</text>
  </g>
  <rect x="945" y="375" width="170" height="52" rx="6" fill="none" stroke="#FF5C8A" stroke-dasharray="5 4"/>
  <text x="1030" y="397" fill="#FF5C8A" font-size="12" text-anchor="middle" font-weight="bold">⚠ PASSIVE MODE</text>
  <text x="1030" y="415" fill="#7E93AC" font-size="10" text-anchor="middle">Settings → Work Mode → Passive</text>

  <!-- ======== draden ESP32 → MAX3485 ======== -->
  <!-- TX → DI (commando's, magenta) -->
  <line x1="330" y1="190" x2="508" y2="190" stroke="#FF5C8A" stroke-width="2.5" marker-end="url(#arrM)"/>
  <text x="419" y="180" fill="#FF5C8A" font-size="11" text-anchor="middle">UART TX → commands</text>
  <!-- RX ← RO (respons, groen) -->
  <line x1="510" y1="250" x2="332" y2="250" stroke="#39FF8A" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="419" y="240" fill="#39FF8A" font-size="11" text-anchor="middle">UART RX ← response</text>
  <!-- GPIO4 → DE+RE (flow control, amber, met splitsing) -->
  <path d="M 330 310 H 460" stroke="#FFC145" stroke-width="2.5" fill="none"/>
  <path d="M 460 310 V 300 H 508" stroke="#FFC145" stroke-width="2.5" fill="none" marker-end="url(#arrA)"/>
  <path d="M 460 310 V 330 H 508" stroke="#FFC145" stroke-width="2.5" fill="none" marker-end="url(#arrA)"/>
  <circle cx="460" cy="310" r="4" fill="#FFC145"/>
  <text x="419" y="352" fill="#FFC145" font-size="11" text-anchor="middle">flow control · DE+RE tied</text>
  <!-- 3V3 → VCC -->
  <line x1="330" y1="370" x2="508" y2="370" stroke="#E0E0E0" stroke-width="2.5" marker-end="url(#arrW)"/>
  <text x="419" y="390" fill="#E0E0E0" font-size="11" text-anchor="middle">3.3 V</text>
  <!-- GND → GND -->
  <line x1="330" y1="430" x2="512" y2="430" stroke="#4A5F7A" stroke-width="2.5"/>
  <text x="419" y="450" fill="#7E93AC" font-size="11" text-anchor="middle">GND</text>

  <!-- ======== RS485 bus MAX3485 → SOFAR (twisted pair) ======== -->
  <line x1="748" y1="250" x2="925" y2="250" stroke="#39FF8A" stroke-width="2.5"/>
  <line x1="748" y1="310" x2="925" y2="310" stroke="#39FF8A" stroke-width="2.5"/>
  <!-- twist-suggestie -->
  <g stroke="#39FF8A" stroke-width="1.2" opacity="0.5">
    <line x1="790" y1="250" x2="810" y2="310"/><line x1="810" y1="250" x2="790" y2="310"/>
    <line x1="840" y1="250" x2="860" y2="310"/><line x1="860" y1="250" x2="840" y2="310"/>
  </g>
  <text x="836" y="236" fill="#39FF8A" font-size="11" text-anchor="middle">RS485 bus · twisted pair</text>
  <text x="836" y="336" fill="#7E93AC" font-size="11" text-anchor="middle">⇄ Modbus RTU · FC 0x42</text>

  <!-- ======== legende ======== -->
  <g font-size="12">
    <line x1="60" y1="530" x2="92" y2="530" stroke="#FF5C8A" stroke-width="3"/>
    <text x="100" y="534" fill="#E0E0E0">commands (write)</text>
    <line x1="300" y1="530" x2="332" y2="530" stroke="#39FF8A" stroke-width="3"/>
    <text x="340" y="534" fill="#E0E0E0">response / telemetry (read)</text>
    <line x1="590" y1="530" x2="622" y2="530" stroke="#FFC145" stroke-width="3"/>
    <text x="630" y="534" fill="#E0E0E0">flow control</text>
    <line x1="770" y1="530" x2="802" y2="530" stroke="#E0E0E0" stroke-width="3"/>
    <text x="810" y="534" fill="#E0E0E0">3.3 V power</text>
    <line x1="950" y1="530" x2="982" y2="530" stroke="#4A5F7A" stroke-width="3"/>
    <text x="990" y="534" fill="#E0E0E0">ground</text>
  </g>

  <!-- ======== waarschuwingen ======== -->
  <rect x="60" y="565" width="530" height="60" rx="8" fill="none" stroke="#FFC145" opacity="0.9"/>
  <text x="80" y="590" fill="#FFC145" font-size="12" font-weight="bold">⚠ Use the 3.3 V MAX3485 variant only</text>
  <text x="80" y="610" fill="#7E93AC" font-size="11">A 5 V module can damage the ESP32.</text>

  <rect x="610" y="565" width="530" height="60" rx="8" fill="none" stroke="#FF5C8A" opacity="0.9"/>
  <text x="630" y="590" fill="#FF5C8A" font-size="12" font-weight="bold">⚠ GPIO4 high = transmit · low = receive</text>
  <text x="630" y="610" fill="#7E93AC" font-size="11">DE and RE driven together — half-duplex direction switching.</text>

  <!-- ======== footer ======== -->
  <text x="60" y="668" fill="#4A5F7A" font-size="11">MAD SCIENCE LAB · sofar-me3000sp-homeassistant · v2.2.0</text>
  <text x="1140" y="668" fill="#4A5F7A" font-size="11" text-anchor="end">"Measured, not guessed."</text>
</svg>
