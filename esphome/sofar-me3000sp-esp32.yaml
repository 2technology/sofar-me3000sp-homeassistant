# ===========================================================================
# SELECT — Werkingsmodus (verschijnt als dropdown in HA)
# ===========================================================================
select:
  - platform: template
    name: "${device_verbose_name} Mode"
    id: inverter_mode
    options:
      - "auto"
      - "charge"
      - "discharge"
      - "standby"
    initial_option: "auto"
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          auto *controller = id(me3000sp);

          if (id(inverter_mode).state == "auto") {
            ESP_LOGI("sofar", "Mode → AUTO");
            std::vector<uint8_t> payload = {0x01, 0x42, 0x01, 0x03, 0x00, 0x00};
            auto cmd = modbus_controller::ModbusCommandItem::create_custom_command(controller, payload);
            controller->queue_command(cmd);

          } else if (id(inverter_mode).state == "standby") {
            ESP_LOGI("sofar", "Mode → STANDBY");
            std::vector<uint8_t> payload = {0x01, 0x42, 0x01, 0x00, 0x55, 0x55};
            auto cmd = modbus_controller::ModbusCommandItem::create_custom_command(controller, payload);
            controller->queue_command(cmd);

          } else if (id(inverter_mode).state == "charge") {
            int rate = std::min(3000, (int) id(charge_rate).state);
            ESP_LOGI("sofar", "Mode → CHARGE @ %d W", rate);
            std::vector<uint8_t> payload = {0x01, 0x42, 0x01, 0x02, (uint8_t)(rate >> 8), (uint8_t)(rate & 0xFF)};
            auto cmd = modbus_controller::ModbusCommandItem::create_custom_command(controller, payload);
            controller->queue_command(cmd);

          } else if (id(inverter_mode).state == "discharge") {
            int rate = std::min(3000, (int) id(discharge_rate).state);
            ESP_LOGI("sofar", "Mode → DISCHARGE @ %d W", rate);
            std::vector<uint8_t> payload = {0x01, 0x42, 0x01, 0x01, (uint8_t)(rate >> 8), (uint8_t)(rate & 0xFF)};
            auto cmd = modbus_controller::ModbusCommandItem::create_custom_command(controller, payload);
            controller->queue_command(cmd);

          }

# ===========================================================================
# NUMBER — Laad/ontlaad-vermogen (verschijnt als slider in HA)
# ===========================================================================
number:
  - platform: template
    name: "${device_verbose_name} Charge Rate"
    id: charge_rate
    icon: "mdi:battery-plus"
    unit_of_measurement: "W"
    device_class: power
    optimistic: true
    min_value: 0
    max_value: 3000
    restore_value: true
    initial_value: 1500
    step: 50
    on_value:
      - lambda: |-
          if (id(inverter_mode).state == "charge") {
            int rate = std::min(3000, (int) x);
            ESP_LOGI("sofar", "Charge rate → %d W", rate);
            auto *controller = id(me3000sp);
            std::vector<uint8_t> payload = {0x01, 0x42, 0x01, 0x02, (uint8_t)(rate >> 8), (uint8_t)(rate & 0xFF)};
            auto cmd = modbus_controller::ModbusCommandItem::create_custom_command(controller, payload);
            controller->queue_command(cmd);
          }

  - platform: template
    name: "${device_verbose_name} Discharge Rate"
    id: discharge_rate
    icon: "mdi:battery-minus"
    unit_of_measurement: "W"
    device_class: power
    optimistic: true
    min_value: 0
    max_value: 3000
    restore_value: true
    initial_value: 1500
    step: 50
    on_value:
      - lambda: |-
          if (id(inverter_mode).state == "discharge") {
            int rate = std::min(3000, (int) x);
            ESP_LOGI("sofar", "Discharge rate → %d W", rate);
            auto *controller = id(me3000sp);
            std::vector<uint8_t> payload = {0x01, 0x42, 0x01, 0x01, (uint8_t)(rate >> 8), (uint8_t)(rate & 0xFF)};
            auto cmd = modbus_controller::ModbusCommandItem::create_custom_command(controller, payload);
            controller->queue_command(cmd);
          }

# ===========================================================================
# SWITCH — Restart
# ===========================================================================
switch:
  - platform: restart
    name: "${device_verbose_name} Restart"
